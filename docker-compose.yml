services:
  db-primary:
    image: bitnami/postgresql:latest
    container_name: loco_db_primary
    restart: always
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-repl_user}
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_password}
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-locouser}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-locopass}
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-locodb}
    volumes:
      - ./infrastructure/database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infrastructure/database/add_partitions.sql:/docker-entrypoint-initdb.d/02_add_partitions.sql
      - postgres_primary_data:/bitnami/postgresql
    ports:
      - "5432:5432"

  db-replica:
    image: bitnami/postgresql:latest
    container_name: loco_db_replica
    restart: always
    depends_on:
      - db-primary
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-repl_user}
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_password}
      POSTGRESQL_MASTER_HOST: db-primary
      POSTGRESQL_MASTER_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_password}
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-locouser}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-locopass}
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-locodb}
    volumes:
      - postgres_replica_data:/bitnami/postgresql
    ports:
      - "5433:5432"

  redis-master:
    image: bitnami/redis:latest
    container_name: loco_redis_master
    restart: always
    environment:
      REDIS_REPLICATION_MODE: master
      REDIS_PASSWORD: ${REDIS_PASSWORD:-locoredis}
    ports:
      - "6379:6379"

  redis-sentinel-1:
    image: bitnami/redis-sentinel:latest
    container_name: loco_redis_sentinel_1
    restart: always
    depends_on:
      - redis-master
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/bitnami/scripts/redis-sentinel/setup.sh
        echo "sentinel resolve-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        echo "sentinel announce-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        exec /opt/bitnami/scripts/redis-sentinel/run.sh
    environment:
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_SET: mymaster
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD:-locoredis}
      REDIS_SENTINEL_PASSWORD: ${REDIS_PASSWORD:-locoredis}

  redis-sentinel-2:
    image: bitnami/redis-sentinel:latest
    container_name: loco_redis_sentinel_2
    restart: always
    depends_on:
      - redis-master
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/bitnami/scripts/redis-sentinel/setup.sh
        echo "sentinel resolve-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        echo "sentinel announce-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        exec /opt/bitnami/scripts/redis-sentinel/run.sh
    environment:
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_SET: mymaster
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD:-locoredis}
      REDIS_SENTINEL_PASSWORD: ${REDIS_PASSWORD:-locoredis}

  redis-sentinel-3:
    image: bitnami/redis-sentinel:latest
    container_name: loco_redis_sentinel_3
    restart: always
    depends_on:
      - redis-master
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/bitnami/scripts/redis-sentinel/setup.sh
        echo "sentinel resolve-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        echo "sentinel announce-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        exec /opt/bitnami/scripts/redis-sentinel/run.sh
    environment:
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_SET: mymaster
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD:-locoredis}
      REDIS_SENTINEL_PASSWORD: ${REDIS_PASSWORD:-locoredis}

  web-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loco_web_1
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/main.py:/app/main.py
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
    depends_on:
      - db-primary
      - db-replica
      - redis-master
      - redis-sentinel-1
      - redis-sentinel-2
      - redis-sentinel-3

  web-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loco_web_2
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/main.py:/app/main.py
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
    depends_on:
      - db-primary
      - db-replica
      - redis-master
      - redis-sentinel-1
      - redis-sentinel-2
      - redis-sentinel-3

  web-3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loco_web_3
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/main.py:/app/main.py
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
    depends_on:
      - db-primary
      - db-replica
      - redis-master
      - redis-sentinel-1
      - redis-sentinel-2
      - redis-sentinel-3

  nginx:
    image: nginx:stable-alpine
    container_name: loco_nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./infrastructure/nginx/certbot/conf:/etc/letsencrypt:ro
      - ./infrastructure/nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - web-1
      - web-2
      - web-3

  certbot:
    image: certbot/certbot
    container_name: loco_certbot
    restart: always
    volumes:
      - ./infrastructure/nginx/certbot/conf:/etc/letsencrypt
      - ./infrastructure/nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: loco_ngrok
    restart: always
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_API_KEY: ${NGROK_APIKEY}
    command:
      - "http"
      - "--url=${NGROK_URL:-crafter-strenuous-bundle.ngrok-free.dev}"
      - "nginx:80"
    depends_on:
      - nginx

  mailpit:
    image: axllent/mailpit:latest
    container_name: loco_mailpit
    restart: always
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web GUI port

volumes:
  postgres_primary_data:
  postgres_replica_data:
  redis_data:
