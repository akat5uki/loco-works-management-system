services:
  db-primary:
    image: bitnami/postgresql:latest
    container_name: loco_db_primary
    restart: always
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: ${POSTGRES_DB}
    volumes:
      - ./infrastructure/database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infrastructure/database/add_partitions.sql:/docker-entrypoint-initdb.d/02_add_partitions.sql
      - postgres_primary_data:/bitnami/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRESQL_USERNAME -d $$POSTGRESQL_DATABASE"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  db-replica:
    image: bitnami/postgresql:latest
    container_name: loco_db_replica
    restart: always
    depends_on:
      db-primary:
        condition: service_healthy
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRESQL_MASTER_HOST: db-primary
      POSTGRESQL_MASTER_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: ${POSTGRES_DB}
    volumes:
      - postgres_replica_data:/bitnami/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRESQL_USERNAME -d $$POSTGRESQL_DATABASE"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  redis-master:
    image: bitnami/redis:latest
    container_name: loco_redis_master
    restart: always
    environment:
      REDIS_REPLICATION_MODE: master
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  redis-sentinel-1:
    image: bitnami/redis-sentinel:latest
    container_name: loco_redis_sentinel_1
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/bitnami/scripts/redis-sentinel/setup.sh
        echo "sentinel resolve-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        echo "sentinel announce-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        exec /opt/bitnami/scripts/redis-sentinel/run.sh
    environment:
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_SET: mymaster
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SENTINEL_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  redis-sentinel-2:
    image: bitnami/redis-sentinel:latest
    container_name: loco_redis_sentinel_2
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/bitnami/scripts/redis-sentinel/setup.sh
        echo "sentinel resolve-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        echo "sentinel announce-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        exec /opt/bitnami/scripts/redis-sentinel/run.sh
    environment:
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_SET: mymaster
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SENTINEL_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  redis-sentinel-3:
    image: bitnami/redis-sentinel:latest
    container_name: loco_redis_sentinel_3
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/bitnami/scripts/redis-sentinel/setup.sh
        echo "sentinel resolve-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        echo "sentinel announce-hostnames yes" >> /opt/bitnami/redis-sentinel/etc/sentinel.conf
        exec /opt/bitnami/scripts/redis-sentinel/run.sh
    environment:
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_SET: mymaster
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SENTINEL_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  web-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loco_web_1
    restart: always
    env_file:
      - .env
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  web-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loco_web_2
    restart: always
    env_file:
      - .env
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  web-3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loco_web_3
    restart: always
    env_file:
      - .env
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  nginx:
    image: nginx:stable-alpine
    container_name: loco_nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./infrastructure/nginx/certbot/conf:/etc/letsencrypt:ro
      - ./infrastructure/nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      web-1:
        condition: service_healthy
      web-2:
        condition: service_healthy
      web-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  certbot:
    image: certbot/certbot
    container_name: loco_certbot
    restart: always
    volumes:
      - ./infrastructure/nginx/certbot/conf:/etc/letsencrypt
      - ./infrastructure/nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_primary_data:
  postgres_replica_data:
  redis_data:
